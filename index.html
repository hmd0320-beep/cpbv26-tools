const LABELS=['3000위권','1000위권','500위권','종결'];
let type='hitter';

const $=s=>document.querySelector(s); const $$=s=>[...document.querySelectorAll(s)];
const slots=$('#slots'), totalEl=$('#total'), rankEl=$('#rank'), nextEl=$('#next'), breakdown=$('#breakdown'), cardType=$('#cardType'), globalWarn=$('#globalWarn');
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function render(){
  slots.innerHTML='';

    const item=DB[type][s.idx]||DB[type][0];
    const card=document.createElement('div'); card.className='card';
    card.innerHTML=`<div class="rowtitle"><b>스킬 ${n+1}</b><span class="score">${item?.[String(s.lv)]==null?'–':Number(item[String(s.lv)]).toFixed(2)}</span></div>

      <div class="warn ${item?.[String(s.lv)]==null?'show':''}">이 스킬은 해당 레벨 점수값이 없습니다.</div>`;
    slots.appendChild(card);
  });
  $$('.lv').forEach(b=>b.onclick=()=>{state[+b.dataset.slot].lv=+b.dataset.lv;render();saveUrl(false)});
  $$('.skillSearch').forEach(inp=>{
    const slot=+inp.dataset.slot;
    const box=document.querySelector(`[data-suggestions="${slot}"]`);
    const showSuggestions=()=>{
      const q=inp.value.trim().toLowerCase();
      const matches=DB[type].map((x,i)=>({...x,_i:i})).filter(x=>!q||x.name.toLowerCase().includes(q)).slice(0,30);
      box.innerHTML=matches.length?matches.map(x=>`<button type="button" class="suggestion" data-pick="${x._i}">${esc(x.name)}</button>`).join(''):'<div class="noResult">검색 결과가 없습니다.</div>';
      box.classList.add('show');
      box.querySelectorAll('[data-pick]').forEach(btn=>btn.onclick=()=>{state[slot].idx=+btn.dataset.pick;render();saveUrl(false)});
    };
    inp.oninput=showSuggestions;
    inp.onfocus=()=>{inp.select();showSuggestions()};
    inp.onkeydown=e=>{if(e.key==='Enter'){e.preventDefault();const idx=DB[type].findIndex(x=>x.name.toLowerCase()===inp.value.trim().toLowerCase());if(idx>=0){state[slot].idx=idx;render();saveUrl(false)}}};
    inp.onblur=()=>setTimeout(()=>{box.classList.remove('show');const idx=DB[type].findIndex(x=>x.name===inp.value);if(idx<0)inp.value=DB[type][state[slot].idx].name},180);
  });
  calc();
}
function calc(){
  const vals=state.map(s=>{const x=DB[type][s.idx];const raw=x?.[String(s.lv)];return {name:x?.name||'',lv:s.lv,v:raw==null?0:Number(raw),missing:raw==null}});
  const sum=vals.reduce((a,b)=>a+b.v,0); totalEl.textContent=sum.toFixed(2);
  const c=CUTS[cardType.value]; let idx=-1; for(let i=0;i<c.length;i++) if(sum>=c[i]) idx=i;
  if(idx<0){rankEl.textContent='기준 미달';nextEl.textContent=`3000위권까지 ${(c[0]-sum).toFixed(2)}점`}
  else if(idx===3){rankEl.textContent='종결 기준 통과';nextEl.textContent=''}
  else{rankEl.textContent=`${LABELS[idx]} 기준 통과`;nextEl.textContent=`${LABELS[idx+1]}까지 ${(c[idx+1]-sum).toFixed(2)}점`}
  breakdown.innerHTML=vals.map(x=>`<div class="breakitem"><span>${esc(x.name)} Lv.${x.lv}</span><span>${x.missing?'값 없음':x.v.toFixed(2)}</span></div>`).join('');
  const names=vals.map(x=>x.name); const dup=[...new Set(names.filter((x,i)=>names.indexOf(x)!==i))];
  const messages=[]; if(dup.length)messages.push(`중복 스킬: ${dup.join(', ')}`); if(vals.some(x=>x.missing))messages.push('점수값이 없는 레벨이 포함되어 있습니다.');
  globalWarn.textContent=messages.join(' · '); globalWarn.classList.toggle('show',messages.length>0);
}
function buildParams(){const p=new URLSearchParams();p.set('type',type);p.set('card',cardType.value);state.forEach((s,i)=>{p.set(`s${i+1}`,s.idx);p.set(`l${i+1}`,s.lv)});return p}
function saveUrl(push=true){const u=location.pathname+'?'+buildParams().toString();history[push?'pushState':'replaceState'](null,'',u)}
function loadParams(){const p=new URLSearchParams(location.search);if(['hitter','pitcher'].includes(p.get('type')))type=p.get('type');if(CUTS[p.get('card')])cardType.value=p.get('card');state=state.map((s,i)=>{const idx=+p.get(`s${i+1}`),lv=+p.get(`l${i+1}`);return {idx:Number.isInteger(idx)&&DB[type][idx]?idx:s.idx,lv:[5,6,7,8].includes(lv)?lv:s.lv}});$$('.tab').forEach(b=>b.classList.toggle('on',b.dataset.type===type))}
function snapshot(){return {type,card:cardType.value,state:JSON.parse(JSON.stringify(state)),savedAt:Date.now()}}

$$('.tab').forEach(b=>b.onclick=()=>{type=b.dataset.type;$$('.tab').forEach(x=>x.classList.toggle('on',x===b));state=[{idx:0,lv:8},{idx:1,lv:8},{idx:2,lv:7}];render();saveUrl(false)});

$('#reset').onclick=()=>{state=[{idx:0,lv:8},{idx:1,lv:8},{idx:2,lv:7}];render();saveUrl(false)};
$('#save').onclick=()=>{const arr=saved();arr.unshift(snapshot());localStorage.setItem('cpbv26-saved',JSON.stringify(arr.slice(0,12)));renderSaved();alert('조합을 저장했습니다.')};
$('#clearSaved').onclick=()=>{localStorage.removeItem('cpbv26-saved');renderSaved()};
$('#share').onclick=async()=>{const url=location.href.split('?')[0]+'?'+buildParams().toString();try{await navigator.clipboard.writeText(url);alert('조합 링크를 복사했습니다.')}catch{prompt('아래 링크를 복사하세요.',url)}};
window.onpopstate=()=>{loadParams();render()};loadParams();render();renderSaved();saveUrl(false);
</script></body></html>
